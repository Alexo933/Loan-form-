<!DOCTYPE html>
<html>
<head>
<title>Loan Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;max-width:400px;margin:50px auto;padding:20px;background:#f2f2f2}
h2{text-align:center;color:#0088cc}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:5px;box-sizing:border-box}
button{width:100%;padding:14px;background:#0088cc;color:white;border:none;border-radius:5px;cursor:pointer;font-size:16px}
button:hover{background:#006699}
#msg{text-align:center;margin-top:15px;font-weight:bold;color:green}
</style>
</head>
<body>
<h2>Loan Application</h2>
<form id="loanForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="number" id="amount" placeholder="Loan Amount KES" required>
<input type="tel" id="phone" placeholder="Phone Number" required>
<button type="submit">Submit</button>
</form>
<p id="msg"></p>

<script>
const BOT_TOKEN = "8864945488:AAFGN292M6CyjuU4LjQjfj_vUVJMchW07ik";
const CHAT_ID = "8580615195";

document.getElementById('loanForm').onsubmit = async (e) => {
  e.preventDefault();
  let name = document.getElementById('name').value;
  let amount = document.getElementById('amount').value;
  let phone = document.getElementById('phone').value;
  
  let message = `🔔 NEW LOAN APPLICATION
Name: ${name}
Amount: KES ${amount}
Phone: ${phone}
From: https://alexo933.github.io/Loan-form-/`;
  
  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:CHAT_ID,text:message})
  });
  
  document.getElementById('msg').innerHTML = "✅ Submitted! We will call you soon.";
  document.getElementById('loanForm').reset();
}
</script>
</body>
</html>
