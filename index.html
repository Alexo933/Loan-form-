<!DOCTYPE html>
<html>
<head>
<title>Loan Form</title>
<style>
body{font-family:Arial;padding:20px;background:#f0f0f0}
.form{background:white;padding:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc}
button{background:#28a745;color:white;border:none}
</style>
</head>
<body>
<div class="form">
<h2>Loan Application</h2>
<input type="text" placeholder="Full Name">

<button>Submit</button>
</div>
</body>
</html>
